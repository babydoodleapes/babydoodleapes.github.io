<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Doodle Apes | Mint</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.8.1/dist/ethers.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

<style>
    :root {
        --doodle-pink: #ffc2d4;
        --doodle-blue: #bde0fe;
        --text-dark: #2d3436;
        --glass: rgba(255, 255, 255, 0.9);
    }

    body {
        margin: 0; font-family: 'Nunito', sans-serif; color: var(--text-dark);
        background: linear-gradient(45deg, #ffc2d4, #bde0fe, #ffeaae, #caffbf);
        background-size: 400% 400%; animation: mesh 15s ease infinite;
        min-height: 100vh; overflow-x: hidden;
    }

    @keyframes mesh { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    .bubble {
        position: fixed; bottom: -100px; background: rgba(255, 255, 255, 0.4);
        border-radius: 50%; z-index: -1; animation: floatUp linear infinite;
    }
    @keyframes floatUp { to { transform: translateY(-120vh); opacity: 0; } }

    .navbar {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 5%; backdrop-filter: blur(10px); background: rgba(255,255,255,0.2);
    }

    .brand { font-family: 'Fredoka'; font-size: 30px; font-weight: 700; color: #ff74a4; text-shadow: 2px 2px 0 white; }

    .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }

    .mint-card {
        background: var(--glass); border-radius: 40px; padding: 40px;
        border: 6px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        text-align: center; position: relative;
    }

    .badge {
        position: absolute; top: -15px; right: 20px; background: #ff7494;
        color: white; padding: 8px 18px; border-radius: 50px; font-weight: 800;
        transform: rotate(5deg); font-family: 'Fredoka';
    }

    .progress-bg { background: #eee; height: 20px; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 2px solid #fff; }
    .progress-bar { height: 100%; width: 0%; background: #ff74a4; transition: 1s; }

    .qty-ctrl { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
    .qty-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #fff; font-size: 24px; cursor: pointer; box-shadow: 0 4px 0 #ddd; }
    .qty-btn:active { transform: translateY(2px); box-shadow: none; }
    
    #amountInput { width: 80px; font-size: 30px; font-family: 'Fredoka'; border: none; background: transparent; text-align: center; font-weight: 700; outline: none; }

    .main-btn {
        width: 100%; padding: 16px; border-radius: 50px; border: none;
        font-family: 'Fredoka'; font-size: 20px; font-weight: 700; cursor: pointer;
        transition: 0.2s; margin-top: 10px; box-shadow: 0 5px 0 rgba(0,0,0,0.1);
    }
    .btn-blue { background: #bde0fe; color: #2d3436; }
    .btn-pink { background: #ffc2d4; color: #2d3436; }
    
    .price-display { background: #fff; padding: 15px; border-radius: 20px; border: 3px dashed #ffc2d4; margin: 20px 0; font-family: 'Fredoka'; }

    .agent-box { background: var(--glass); border-radius: 30px; padding: 30px; margin-top: 30px; border: 4px solid #fff; }
    input.agent-input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; border: 2px solid #eee; font-family: inherit; box-sizing: border-box; }
</style>
</head>
<body>

<div id="bubbles-container"></div>

<nav class="navbar">
    <div class="brand">Baby Doodle Apes</div>
    <button id="connectBtn" class="main-btn" style="width: auto; margin: 0; font-size: 14px; padding: 10px 20px; background: white;">Connect Wallet</button>
</nav>

<div class="container">
    <div class="mint-card">
        <div class="badge" id="promoBadge">1st MINT FREE</div>
        <h2 style="font-family: 'Fredoka'; margin-bottom: 5px;">Public Mint</h2>
        <p id="walletAddr" style="font-size: 12px; color: #636e72; margin-bottom: 20px;">Please connect your wallet</p>

        <div class="progress-bg"><div class="progress-bar" id="pBar"></div></div>
        <p style="font-weight: 800; font-size: 14px;"><span id="mCount">0</span> / 3332 Minted</p>

        <div class="qty-ctrl">
            <button class="qty-btn" id="minus">-</button>
            <input type="number" id="amountInput" value="1" min="1" max="200">
            <button class="qty-btn" id="plus">+</button>
        </div>
        <button id="maxBtn" style="background: none; border: none; text-decoration: underline; cursor: pointer; font-weight: 800; font-size: 12px;">SET MAX (200)</button>

        <div class="price-display">
            Total Price: <span id="totalEth" style="color: #ff74a4; font-size: 22px;">0.00</span> ETH
            <div id="freeInfo" style="font-size: 11px; color: #00b894; margin-top: 5px; display: none;">Your first mint is free! 🎁</div>
        </div>

        <button class="main-btn btn-blue" id="mintBtn">MINT NOW</button>
        <p id="statusMsg" style="font-size: 13px; font-weight: 700; margin-top: 15px; color: #ff74a4;"></p>
    </div>

    <div class="agent-box">
        <h3 style="font-family: 'Fredoka'; margin-top: 0;">Agent Identity</h3>
        <input class="agent-input" id="inpId" placeholder="Token ID">
        <input class="agent-input" id="inpEp" placeholder="Endpoint">
        <input class="agent-input" id="inpMd" placeholder="Model">
        <input class="agent-input" id="inpCap" placeholder="Capabilities">
        <button class="main-btn btn-pink" id="agentBtn">Update Identity</button>
    </div>
</div>

<script>
// UI: Bubbles
const bContainer = document.getElementById('bubbles-container');
for(let i=0; i<15; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = Math.random() * 50 + 20 + 'px';
    b.style.width = s; b.style.height = s;
    b.style.left = Math.random() * 100 + 'vw';
    b.style.animationDuration = Math.random() * 10 + 5 + 's';
    b.style.animationDelay = Math.random() * 5 + 's';
    bContainer.appendChild(b);
}

// Logic Variables
const CONTRACT_ADDR = "0x53f8b95687c5a4be9089dd63165d0df59f323911";
const PRICE = 0.00011;
const ABI = [
    "function publicMint(uint256) payable",
    "function totalSupply() view returns (uint256)",
    "function balanceOf(address) view returns (uint256)",
    "function setAgentIdentity(uint256,string,string,string)"
];

let provider, signer, contract, userAddress, userNFTBalance = 0;

// Update UI Price
function updateUIPrice() {
    const qty = parseInt(document.getElementById("amountInput").value) || 1;
    let finalTotal = 0;

    if(userAddress && userNFTBalance === 0) {
        finalTotal = (qty - 1) * PRICE;
        document.getElementById("freeInfo").style.display = "block";
        document.getElementById("promoBadge").innerText = "FREE MINT ELIGIBLE";
    } else {
        finalTotal = qty * PRICE;
        document.getElementById("freeInfo").style.display = userAddress ? "none" : "none";
        document.getElementById("promoBadge").innerText = "MINT ACTIVE";
    }
    if(finalTotal < 0) finalTotal = 0;
    document.getElementById("totalEth").innerText = finalTotal.toFixed(5);
}

// Data Fetching
async function syncData() {
    try {
        const supply = await contract.totalSupply();
        const current = Number(supply);
        document.getElementById("mCount").innerText = current;
        document.getElementById("pBar").style.width = (current / 3332 * 100) + "%";

        if(userAddress) {
            const bal = await contract.balanceOf(userAddress);
            userNFTBalance = Number(bal);
        }
        updateUIPrice();
    } catch(e) { console.error("Sync Error:", e); }
}

// Connect Wallet
async function connect() {
    console.log("Connecting...");
    if (!window.ethereum) return alert("MetaMask not found!");

    try {
        provider = new ethers.BrowserProvider(window.ethereum);
        
        // Force network switch to Ethereum Mainnet
        const network = await provider.getNetwork();
        if (network.chainId !== 1n) {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x1' }],
            });
            provider = new ethers.BrowserProvider(window.ethereum);
        }

        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        userAddress = accounts[0];
        contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);

        document.getElementById("walletAddr").innerText = "Connected: " + userAddress.slice(0,6) + "..." + userAddress.slice(-4);
        document.getElementById("connectBtn").innerText = "Connected ✓";
        
        await syncData();
    } catch (err) {
        console.error("Connection failed", err);
        alert("Connection failed. Please check MetaMask.");
    }
}

// Mint Function
async function startMint() {
    if(!contract) return alert("Connect wallet first!");
    const qty = parseInt(document.getElementById("amountInput").value);
    const status = document.getElementById("statusMsg");

    try {
        let cost = (userNFTBalance === 0) ? (qty - 1) * PRICE : qty * PRICE;
        if(cost < 0) cost = 0;

        status.innerText = "Confirm transaction in wallet...";
        const tx = await contract.publicMint(qty, { 
            value: ethers.parseEther(cost.toFixed(5).toString()) 
        });
        
        status.innerText = "Minting in progress...";
        await tx.wait();
        status.innerText = "Success! Baby Doodle Apes minted! 🍼";
        syncData();
    } catch (e) {
        status.innerText = "Transaction failed or rejected.";
        console.error(e);
    }
}

// Initial Events
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("connectBtn").onclick = connect;
    document.getElementById("mintBtn").onclick = startMint;
    
    document.getElementById("plus").onclick = () => { document.getElementById("amountInput").value++; updateUIPrice(); };
    document.getElementById("minus").onclick = () => { 
        if(document.getElementById("amountInput").value > 1) {
            document.getElementById("amountInput").value--; 
            updateUIPrice();
        }
    };
    document.getElementById("maxBtn").onclick = () => { document.getElementById("amountInput").value = 200; updateUIPrice(); };
    document.getElementById("amountInput").oninput = updateUIPrice;

    // Agent Update
    document.getElementById("agentBtn").onclick = async () => {
        if(!contract) return;
        try {
            const tx = await contract.setAgentIdentity(
                document.getElementById("inpId").value,
                document.getElementById("inpEp").value,
                document.getElementById("inpMd").value,
                document.getElementById("inpCap").value
            );
            await tx.wait();
            alert("Agent Updated!");
        } catch(e) { alert("Error updating agent."); }
    };
});
</script>
</body>
</html>
